apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: platform-admin
  namespace: platform
rules:
- apiGroups: ["", "apps", "networking.k8s.io"]
  resources: ["pods", "services", "deployments", "networkpolicies", "configmaps", "secrets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: platform-admin-binding
  namespace: platform
subjects:
- kind: Group
  name: platform-admins
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: platform-admin
  apiGroup: rbac.authorization.k8s.io
