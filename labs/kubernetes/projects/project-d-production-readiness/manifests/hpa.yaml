apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: shop, namespace: lab }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: shop }   # (8)
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
