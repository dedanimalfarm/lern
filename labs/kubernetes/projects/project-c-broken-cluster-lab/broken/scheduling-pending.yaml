# ИНЦИДЕНТ ПЛАНИРОВАНИЯ: под просит 8 ядер CPU, которых нет ни на одной ноде
# (worker'ы ~1.4 CPU allocatable). Симптом: под навсегда Pending, в events
# FailedScheduling "Insufficient cpu". Это класс "не размещается" — родственник
# eviction по давлению ресурсов (модуль 06/08): scheduler не находит ноду.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: heavy-compute
  namespace: lab
  labels: { app: heavy-compute }
spec:
  replicas: 1
  selector: { matchLabels: { app: heavy-compute } }
  template:
    metadata:
      labels: { app: heavy-compute }
    spec:
      containers:
        - name: app
          image: nginx:1.27-alpine
          resources:
            requests:
              cpu: "8"            # ни одна нода столько не даст => Pending навсегда
              memory: 64Mi
            limits:
              cpu: "8"
              memory: 128Mi
