apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: lab
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
    clients:
    - url: http://loki.lab.svc.cluster.local:3100/loki/api/v1/push
    positions:
      filename: /tmp/positions.yaml
    scrape_configs:
    - job_name: kubernetes-pods
      kubernetes_sd_configs:
      - role: pod
      # containerd пишет логи в CRI-формате: "<ts> <stdout|stderr> <F|P> <строка>".
      # Без stage `cri` префикс попадает в тело лога в Loki, и парсеры LogQL
      # (| json, | logfmt, | pattern) ломаются о него — строка не начинается
      # с JSON. Stage отрезает префикс и кладёт stream в метку.
      pipeline_stages:
      - cri: {}
      relabel_configs:
      # __host__ сверяется с HOSTNAME promtail-пода: без env HOSTNAME=spec.nodeName
      # (см. DaemonSet ниже) имя пода != имя ноды и ВСЕ targets отбрасываются.
      - source_labels: [__meta_kubernetes_pod_node_name]
        target_label: __host__
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
      - action: replace
        source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      - action: replace
        source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
      - action: replace
        source_labels: [__meta_kubernetes_pod_container_name]
        target_label: container
      # Без __path__ promtail'у НЕЧЕГО тейлить (kubernetes_sd сам путей не даёт):
      # собираем путь kubelet-логов /var/log/pods/<ns>_<pod>_<uid>/<container>/*.log
      - replacement: /var/log/pods/*$1/*.log
        separator: /
        source_labels: [__meta_kubernetes_pod_uid, __meta_kubernetes_pod_container_name]
        target_label: __path__
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: lab
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      containers:
      - name: promtail
        image: grafana/promtail:2.9.2
        args:
        - -config.file=/etc/promtail/promtail.yaml
        env:
        # promtail фильтрует discovery-targets по совпадению __host__ со СВОИМ
        # hostname; по умолчанию это имя пода. Пробрасываем имя ноды, иначе
        # DaemonSet «видит» ноль подов и Loki остаётся пустым.
        - name: HOSTNAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        volumeMounts:
        - name: config
          mountPath: /etc/promtail
        - name: run
          mountPath: /run/promtail
        - name: containers
          mountPath: /var/log/containers
          readOnly: true
        - name: pods
          mountPath: /var/log/pods
          readOnly: true
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            # см. аналогичный комментарий в loki.yaml (LimitRange-дефолт 300m)
            cpu: 100m
            memory: 128Mi
      volumes:
      - name: config
        configMap:
          name: promtail-config
      - name: run
        hostPath:
          path: /run/promtail
      - name: containers
        hostPath:
          path: /var/log/containers
      - name: pods
        hostPath:
          path: /var/log/pods
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: lab
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail-role
rules:
- apiGroups: [""]
  resources:
  - nodes
  - nodes/proxy
  - services
  - endpoints
  - pods
  verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail-binding
subjects:
- kind: ServiceAccount
  name: promtail
  namespace: lab
roleRef:
  kind: ClusterRole
  name: promtail-role
  apiGroup: rbac.authorization.k8s.io
