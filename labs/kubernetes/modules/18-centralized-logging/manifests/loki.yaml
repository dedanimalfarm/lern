apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: lab
data:
  local-config.yaml: |
    auth_enabled: false
    server:
      http_listen_port: 3100
    # Дефолтный ingestion-лимит (4MB/s) мал для холодного старта стенда:
    # promtail хранит positions в emptyDir, после рестарта ноды/пода он
    # перечитывает ВСЕ /var/log/pods с нуля и шлёт залп со всего кластера ->
    # Loki отвечает 429 (rate limit), доставка свежих строк задерживается
    # на минуты (ловили в QA). Поднимаем лимиты, чтобы backfill проглатывался.
    limits_config:
      ingestion_rate_mb: 16
      ingestion_burst_size_mb: 32
    common:
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        instance_addr: 127.0.0.1
        kvstore:
          store: inmemory
    schema_config:
      configs:
        - from: 2020-10-24
          store: boltdb-shipper
          object_store: filesystem
          schema: v11
          index:
            prefix: index_
            period: 24h
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      containers:
      - name: loki
        image: grafana/loki:2.9.2
        args:
        - -config.file=/etc/loki/local-config.yaml
        ports:
        - containerPort: 3100
          name: http
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            # cpu-limit задан явно: иначе LimitRange lab добивает дефолтные
            # 300m и стек м18 зря выедает квоту ns (мешал м24 — ReplicaFailure).
            cpu: 200m
            memory: 512Mi
        volumeMounts:
        - name: config
          mountPath: /etc/loki
        - name: storage
          mountPath: /loki
      volumes:
      - name: config
        configMap:
          name: loki-config
      - name: storage
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: lab
spec:
  ports:
  - port: 3100
    targetPort: http
  selector:
    app: loki
