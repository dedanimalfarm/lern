# VSO читает динамические креды из Vault и кладёт в k8s Secret (pg-dynamic-creds),
# автоматически РОТИРУЯ их по TTL. Каждый выпуск — НОВЫЙ postgres-пользователь.
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultConnection
metadata: { name: vault-conn, namespace: lab }
spec: { address: http://vault.lab.svc:8200 }
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata: { name: vault-auth, namespace: lab }
spec:
  vaultConnectionRef: vault-conn
  method: kubernetes
  mount: kubernetes
  kubernetes: { role: dynrole-role, serviceAccount: vso-auth }
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultDynamicSecret
metadata: { name: pg-dynamic, namespace: lab }
spec:
  vaultAuthRef: vault-auth
  mount: database
  path: creds/dynrole
  destination: { name: pg-dynamic-creds, create: true }
