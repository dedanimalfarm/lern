# SA vso-auth — личность, которой VSO аутентифицируется в Vault (k8s auth).
# ClusterRoleBinding system:auth-delegator — чтобы SA Vault'а (lab:default) мог
# валидировать токены через TokenReview (нужно для kubernetes-auth Vault).
apiVersion: v1
kind: ServiceAccount
metadata: { name: vso-auth, namespace: lab }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata: { name: vault-token-reviewer }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: system:auth-delegator }
subjects:
- { kind: ServiceAccount, name: default, namespace: lab }
