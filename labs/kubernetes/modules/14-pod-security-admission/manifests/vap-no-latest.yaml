# ValidatingAdmissionPolicy (встроенный admission, GA с k8s 1.30) на CEL:
# запрещает образы с тегом :latest или вовсе без тега. Без установки Kyverno/OPA.
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: no-latest-tag
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
    - apiGroups: [""]
      apiVersions: ["v1"]
      operations: ["CREATE", "UPDATE"]
      resources: ["pods"]
  validations:
  - expression: "object.spec.containers.all(c, (c.image.matches('^.*:[a-zA-Z0-9_.-]+$') && !c.image.matches('^.*:latest$')) || c.image.matches('^.*@sha256:[a-f0-9]+$'))"
    message: "образы с тегом ':latest' или без тега запрещены — пиньте конкретную версию"
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: no-latest-tag-binding
spec:
  policyName: no-latest-tag
  validationActions: ["Deny"]
  matchResources:
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: lab
