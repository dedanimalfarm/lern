apiVersion: apps/v1
kind: Deployment
metadata:
  name: quota-demo
  labels:
    app: quota-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: quota-demo
  template:
    metadata:
      labels:
        app: quota-demo
    spec:
      containers:
      - name: nginx
        image: nginx:1.27-alpine
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
