apiVersion: apps/v1
kind: Deployment
metadata:
  name: hpa-demo
  namespace: lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hpa-demo
  template:
    metadata:
      labels:
        app: hpa-demo
    spec:
      containers:
      - name: php-apache
        # классический CPU-bound образ из доков k8s: на каждый запрос крутит
        # тяжёлую математику, поэтому удобно нагружать для демонстрации HPA.
        # ПИН ПО ДАЙДЖЕСТУ намеренно: у hpa-example нет версионного тега, а голое
        # `registry.k8s.io/hpa-example` = `:latest` — анти-паттерн (ломает иммутабельность
        # и предсказуемость кэша), который запрещает наш же модуль 14
        # (ValidatingAdmissionPolicy no-latest-tag режет :latest/без-тега в ns lab).
        # Дайджест иммутабелен и проходит VAP. Обновлять:
        #   docker buildx imagetools inspect registry.k8s.io/hpa-example  (или `crane digest`).
        image: registry.k8s.io/hpa-example@sha256:581697a37f0e136db86d6b30392f0db40ce99c8248a7044c770012f4e8491544
        ports:
        - containerPort: 80
        resources:
          requests:
            # requests.cpu ОБЯЗАТЕЛЕН для HPA по CPU-утилизации: процент считается
            # как usage / requests. Без него HPA покажет targets <unknown>.
            cpu: 200m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
