apiVersion: apps/v1
kind: Deployment
metadata:
  name: hpa-demo
  namespace: lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hpa-demo
  template:
    metadata:
      labels:
        app: hpa-demo
    spec:
      containers:
      - name: php-apache
        image: registry.k8s.io/hpa-example
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 200m        # фикс: requests.cpu задан -> HPA считает утилизацию
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 128Mi
