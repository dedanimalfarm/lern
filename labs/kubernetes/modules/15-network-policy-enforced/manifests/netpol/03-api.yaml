# api (backend): принимает ingress ТОЛЬКО от web на :80; egress ТОЛЬКО к db на :80.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-policy
  namespace: lab
spec:
  podSelector:
    matchLabels:
      app: api
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: web
    ports:
    - { protocol: TCP, port: 80 }
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: db
    ports:
    - { protocol: TCP, port: 80 }
