# Трёхуровневое приложение для микросегментации: web -> api -> db.
# Все на nginx (простой HTTP-ответчик, удобно проверять связность через wget).
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: web, namespace: lab }
spec:
  replicas: 1
  selector: { matchLabels: { app: web } }
  template:
    metadata: { labels: { app: web, tier: frontend } }
    spec:
      containers:
      - name: nginx
        image: nginx:1.27-alpine
        ports: [{ containerPort: 80 }]
        securityContext: { allowPrivilegeEscalation: false }
---
apiVersion: v1
kind: Service
metadata: { name: web, namespace: lab }
spec:
  selector: { app: web }
  ports: [{ port: 80, targetPort: 80 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: api, namespace: lab }
spec:
  replicas: 1
  selector: { matchLabels: { app: api } }
  template:
    metadata: { labels: { app: api, tier: backend } }
    spec:
      containers:
      - name: nginx
        image: nginx:1.27-alpine
        ports: [{ containerPort: 80 }]
        securityContext: { allowPrivilegeEscalation: false }
---
apiVersion: v1
kind: Service
metadata: { name: api, namespace: lab }
spec:
  selector: { app: api }
  ports: [{ port: 80, targetPort: 80 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: db, namespace: lab }
spec:
  replicas: 1
  selector: { matchLabels: { app: db } }
  template:
    metadata: { labels: { app: db, tier: data } }
    spec:
      containers:
      - name: nginx
        image: nginx:1.27-alpine
        ports: [{ containerPort: 80 }]
        securityContext: { allowPrivilegeEscalation: false }
---
apiVersion: v1
kind: Service
metadata: { name: db, namespace: lab }
spec:
  selector: { app: db }
  ports: [{ port: 80, targetPort: 80 }]
