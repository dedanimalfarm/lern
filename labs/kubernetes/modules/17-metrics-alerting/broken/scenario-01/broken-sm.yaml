apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: metrics-app
  namespace: lab
  # labels:
  #   release: kps  <- Отсутствие этого label ломает скрейпинг
spec:
  selector:
    matchLabels: { app: metrics-app }
  endpoints:
  - port: metrics
    interval: 15s
    path: /metrics
