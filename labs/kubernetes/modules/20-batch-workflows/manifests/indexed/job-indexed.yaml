# Indexed Job — статическое партиционирование работы между подами.
# completionMode: Indexed выдаёт каждому поду УНИКАЛЬНЫЙ индекс 0..(completions-1)
# в переменной JOB_COMPLETION_INDEX (и в аннотации/hostname). Под сам решает, какую
# часть данных обработать по своему индексу — без внешней очереди-координатора.
# Классика: «шард N из M», обработка партиции таблицы, кусок файла.
apiVersion: batch/v1
kind: Job
metadata:
  name: job-indexed
  namespace: lab
spec:
  completions: 4               # 4 шарда => индексы 0,1,2,3
  parallelism: 4               # все шарды параллельно
  completionMode: Indexed      # <-- ключевое отличие от обычного (NonIndexed) Job
  backoffLimit: 4
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: shard
        image: busybox:1.36
        # JOB_COMPLETION_INDEX подставляется kubelet'ом в КАЖДЫЙ под свой.
        # Под печатает свой шард — в реальном коде это «обработать партицию #index».
        command:
        - sh
        - -c
        - 'echo "shard ${JOB_COMPLETION_INDEX} of 4 on $(hostname)"; sleep 3'
        resources:
          requests: { cpu: 25m, memory: 16Mi }
          limits:   { cpu: 100m, memory: 32Mi }
