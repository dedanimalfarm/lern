apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: demo-rollout
  namespace: lab
spec:
  replicas: 4
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: demo-rollout
  template:
    metadata:
      labels:
        app: demo-rollout
    spec:
      containers:
      - name: app
        image: argoproj/rollouts-demo:blue
        ports:
        - containerPort: 8080
        # Явные ресурсы обязательны: ns lab под ResourceQuota (limits.cpu=2),
        # а LimitRange выдаёт контейнеру без ресурсов 300m limits — 8 подов
        # двух rollout'ов (плюс canary-surge) в квоту не влезают (ловили
        # ReplicaFailure вживую).
        resources:
          requests:
            cpu: 20m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
  strategy:
    canary:
      # Фоновый анализ: стартует с ПЕРВОГО шага и бежит ПАРАЛЛЕЛЬНО прогрессу
      # канарейки; провал анализа = автоматический abort + откат на stable.
      # startingStep: 0 важен — канарейка с битым образом не достигает
      # weight 25 и до шага 1 не доходит, анализ должен начаться раньше.
      analysis:
        templates:
        - templateName: success-rate
        startingStep: 0
        args:
        - name: app
          value: demo-rollout
      steps:
      - setWeight: 25
      - pause:
          duration: 5s
      - setWeight: 50
      # Manual promotion step (indefinite pause)
      - pause: {}
      - setWeight: 100
