apiVersion: apps/v1
kind: Deployment
metadata:
  name: slow-app
  labels:
    app: slow-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: slow-app
  template:
    metadata:
      labels:
        app: slow-app
    spec:
      containers:
      - name: slow-app
        image: nginx:1.27-alpine
        command: ["/bin/sh", "-c", "sleep 15 && exec nginx -g 'daemon off;'"]
        ports:
        - containerPort: 80
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 2
          periodSeconds: 2
          failureThreshold: 3
