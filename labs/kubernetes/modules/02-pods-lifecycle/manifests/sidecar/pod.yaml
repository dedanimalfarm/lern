apiVersion: v1
kind: Pod
metadata:
  name: sidecar-demo
  namespace: lab
spec:
  initContainers:
  - name: vault-agent
    image: vault:1.13.0
    restartPolicy: Always
    command: ["sh", "-c", "echo 'starting vault agent proxy' && sleep infinity"]
  containers:
  - name: app
    image: busybox:1.36
    command: ["sh", "-c", "echo 'app running' && sleep 10 && echo 'app done'"]
  restartPolicy: Never
