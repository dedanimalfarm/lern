apiVersion: v1
kind: Pod
metadata:
  name: storage-emptydir
  namespace: lab
spec:
  volumes:
  - name: cache
    emptyDir: {}
  containers:
  - name: writer
    image: busybox:1.36
    # Пишет дату в общий том каждые 5с. Триггер /tmp/crash лежит в ЭФЕМЕРНОЙ ФС
    # контейнера (не в /cache!): touch /tmp/crash роняет контейнер с exit 1, kubelet
    # его перезапускает, на рестарте /tmp обнуляется — удобно для демо в README 1.2.
    command: ["sh", "-c", "while true; do [ -f /tmp/crash ] && exit 1; date >> /cache/out.log; sleep 5; done"]
    volumeMounts:
    - name: cache
      mountPath: /cache
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi
  - name: reader
    image: busybox:1.36
    command: ["sh", "-c", "tail -f /cache/out.log"]
    volumeMounts:
    - name: cache
      mountPath: /cache
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi
