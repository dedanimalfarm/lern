apiVersion: apps/v1
kind: Deployment
metadata:
  name: pvc-consumer
  namespace: lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pvc-consumer
  template:
    metadata:
      labels:
        app: pvc-consumer
    spec:
      containers:
      - name: app
        image: busybox:1.36
        # Потребитель demo-pvc. Нужен по двум причинам:
        #  1) При volumeBindingMode=WaitForFirstConsumer (default в local-path k3s/kind)
        #     PVC переходит в Bound ТОЛЬКО когда появляется Pod, который его монтирует.
        #  2) Делает demo-pvc "живым" для verify.sh (require_pvc_bound).
        command: ["sh", "-c", "while true; do echo $(date) >> /data/consumer.log; sleep 10; done"]
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: demo-pvc
