# vcluster 0.34.2 (OSS, дистро k8s) — vendored-рендер helm-чарта.
# Перегенерация:
#   helm repo add loft-sh https://charts.loft.sh
#   helm template my-vcluster loft-sh/vcluster --version 0.34.2 -n lab \
#     -f helm-values.yaml > manifests/01-vcluster.yaml   (+ эта шапка)
# Почему НЕ 0.19, который был тут раньше: на k8s 1.33+ (у нас 1.36) включён
# MultiCIDRServiceAllocator, и apiserver больше не пишет валидный диапазон в
# ошибке создания Service с неверным clusterIP ("the provided network does not
# match the current range" вместо "The range of valid IPs is ..."). Автодетект
# service-CIDR в vcluster 0.19 парсил именно этот текст -> падал в дефолт
# 10.96.0.0/12 (а у Kubespray 10.233.0.0/18) -> syncer не мог синхронизировать
# ни одного сервиса/пода. Современный vcluster детектит CIDR корректно.
# Ресурсы заданы явно (helm-values.yaml): без них LimitRange lab выдал бы
# контейнеру 256Mi limit — мало для embedded apiserver+kine (OOM).
---
# Source: vcluster/templates/serviceaccount.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vc-my-vcluster
  namespace: lab
  labels:
    app: vcluster
    chart: "vcluster-0.34.2"
    release: "my-vcluster"
    heritage: "Helm"
---
# Source: vcluster/templates/workload-serviceaccount.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vc-workload-my-vcluster
  namespace: lab
  labels:
    app: vcluster
    chart: "vcluster-0.34.2"
    release: "my-vcluster"
    heritage: "Helm"
---
# Source: vcluster/templates/config-secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: "vc-config-my-vcluster"
  namespace: lab
  labels:
    app: vcluster
    chart: "vcluster-0.34.2"
    release: "my-vcluster"
    heritage: "Helm"
type: Opaque
data:
  config.yaml: ""
---
# Source: vcluster/templates/clusterrole.yaml
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: vc-my-vcluster-v-lab
  labels:
    app: vcluster
    chart: "vcluster-0.34.2"
    release: "my-vcluster"
    heritage: "Helm"
rules:
  - apiGroups: [ "" ]
    resources: [ "persistentvolumes" ]
    verbs: [ "get", "list" ]
  
  - apiGroups: [ "snapshot.storage.k8s.io" ]
    resources: [ "volumesnapshotclasses" ]
    verbs: ["get", "list"]
  - apiGroups: [ "snapshot.storage.k8s.io" ]
    resources: [ "volumesnapshotcontents" ]
    verbs: ["create", "delete", "patch", "update", "get", "list"]
---
# Source: vcluster/templates/clusterrolebinding.yaml
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: vc-my-vcluster-v-lab
  labels:
    app: vcluster
    chart: "vcluster-0.34.2"
    release: "my-vcluster"
    heritage: "Helm"
subjects:
  - kind: ServiceAccount
    name: vc-my-vcluster
    namespace: lab
roleRef:
  kind: ClusterRole
  name: vc-my-vcluster-v-lab
  apiGroup: rbac.authorization.k8s.io
---
# Source: vcluster/templates/role.yaml
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: vc-my-vcluster
  namespace: lab
  labels:
    app: vcluster
    chart: "vcluster-0.34.2"
    release: "my-vcluster"
    heritage: "Helm"
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets", "services", "pods", "pods/attach", "pods/portforward", "pods/exec", "persistentvolumeclaims"]
    verbs: ["create", "delete", "patch", "update", "get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/status", "pods/ephemeralcontainers"]
    verbs: ["patch", "update"]
  - apiGroups: [""]
    resources: ["pods/resize"]
    verbs: ["patch", "update"]
  - apiGroups: ["apps"]
    resources: ["statefulsets", "replicasets", "deployments"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: [""]
    resources: ["endpoints", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: [ "create", "get", "list", "watch" ]
  - apiGroups: [ "events.k8s.io" ]
    resources: ["events"]
    verbs: [ "create", "get", "list", "watch" ]
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["create", "delete", "patch", "update"]
  - apiGroups: ["discovery.k8s.io"]
    resources: [ "endpointslices" ]
    verbs: [ "create", "list", "get", "delete", "patch", "update", "watch" ]
  - apiGroups: [ "snapshot.storage.k8s.io" ]
    resources: [ "volumesnapshots" ]
    verbs: ["create", "delete", "patch", "update", "get", "list"]
---
# Source: vcluster/templates/rolebinding.yaml
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: vc-my-vcluster
  namespace: lab
  labels:
    app: vcluster
    chart: "vcluster-0.34.2"
    release: "my-vcluster"
    heritage: "Helm"
subjects:
  - kind: ServiceAccount
    name: vc-my-vcluster
    namespace: lab
roleRef:
  kind: Role
  name: vc-my-vcluster
  apiGroup: rbac.authorization.k8s.io
---
# Source: vcluster/templates/headless-service.yaml
apiVersion: v1
kind: Service
metadata:
  name: my-vcluster-headless
  namespace: lab
  labels:
    app: vcluster
    chart: "vcluster-0.34.2"
    release: "my-vcluster"
    heritage: "Helm"
spec:
  publishNotReadyAddresses: true
  ports:
    - name: https
      port: 443
      targetPort: 8443
      protocol: TCP
  clusterIP: None
  selector:
    app: vcluster
    release: "my-vcluster"
---
# Source: vcluster/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: my-vcluster
  namespace: lab
  labels:
    app: vcluster
    chart: "vcluster-0.34.2"
    release: "my-vcluster"
    heritage: "Helm"
    vcluster.loft.sh/service: "true"
spec:
  type: ClusterIP
  ports:
    - name: https
      port: 443
      targetPort: 8443
      nodePort: 0
      protocol: TCP
    - name: kubelet
      port: 10250
      targetPort: 8443
      nodePort: 0
      protocol: TCP
  selector:
    app: vcluster
    release: "my-vcluster"
---
# Source: vcluster/templates/statefulset.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: my-vcluster
  namespace: lab
  labels:
    app: vcluster
    chart: "vcluster-0.34.2"
    release: "my-vcluster"
    heritage: "Helm"
spec:
  selector:
    matchLabels:
      app: vcluster
      release: "my-vcluster"
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
  serviceName: my-vcluster-headless
  podManagementPolicy: Parallel
  
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ReadWriteOnce]
      resources:
        requests:
          storage: 2Gi
  replicas: 1
  template:
    metadata:
      annotations:
        vClusterConfigHash: "d9a527652ebb4b09fb7ddc80b02f344c4856ad98129ed768f784b6606f6555aa"
      labels:
        app: vcluster
        release: "my-vcluster"
    spec:
      terminationGracePeriodSeconds: 15
      serviceAccountName: vc-my-vcluster
      volumes:        
        - name: helm-cache
          emptyDir: {}
        - emptyDir: {}
          name: binaries
        - name: tmp
          emptyDir: {}
        - name: certs
          emptyDir: {}
        - name: vcluster-config
          secret:
            secretName: vc-config-my-vcluster
      initContainers:
        
        - name: kubernetes
          image: "ghcr.io/loft-sh/kubernetes:v1.35.0"
          volumeMounts:
            - mountPath: /binaries
              name: binaries
          command:
            - cp
          args:
            - -r 
            - /kubernetes/.
            - /binaries/
          securityContext:
            {}
          resources:
            limits:
              cpu: 100m
              memory: 256Mi
            requests:
              cpu: 40m
              memory: 64Mi
      enableServiceLinks: true
      containers:
        - name: syncer
          image: "ghcr.io/loft-sh/vcluster-oss:0.34.2"
          imagePullPolicy: 
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 60
            periodSeconds: 2
            timeoutSeconds: 3
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8443
              scheme: HTTPS
            periodSeconds: 2
            timeoutSeconds: 3
            failureThreshold: 60
          startupProbe:
            httpGet:
              path: /readyz
              port: 8443
              scheme: HTTPS
            periodSeconds: 6
            timeoutSeconds: 3
            failureThreshold: 300
          securityContext:
            allowPrivilegeEscalation: false
            runAsGroup: 0
            runAsUser: 0
          resources:
            limits:
              cpu: "1"
              ephemeral-storage: 8Gi
              memory: 1Gi
            requests:
              cpu: 200m
              ephemeral-storage: 400Mi
              memory: 512Mi
          env:
            - name: VCLUSTER_NAME
              value: "my-vcluster"
            - name: LOFT_LOG_ENCODING
              value: console
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          volumeMounts:            
            - name: data
              mountPath: /data
            - name: binaries
              mountPath: /binaries
            - name: certs
              mountPath: /pki
            - name: helm-cache
              mountPath: /.cache/helm
            - name: vcluster-config
              mountPath: /var/lib/vcluster
            - name: tmp
              mountPath: /tmp
