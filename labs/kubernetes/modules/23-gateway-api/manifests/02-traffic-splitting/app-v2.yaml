apiVersion: apps/v1
kind: Deployment
metadata:
  name: store-v2
  namespace: lab-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: store
      version: v2
  template:
    metadata:
      labels:
        app: store
        version: v2
    spec:
      containers:
      - name: web
        image: hashicorp/http-echo:1.0.0
        args: ["-text=Store V2"]
        ports:
        - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: store-v2
  namespace: lab-gateway
spec:
  selector:
    app: store
    version: v2
  ports:
  - port: 80
    targetPort: 5678
