# Демо-фронтенд: на каждый запрос ходит в backend. Инструментированная
# библиотека requests сама подставляет в исходящий запрос заголовок
# W3C traceparent — серверный спан backend'а становится ребёнком клиентского
# спана frontend'а. Именно так trace «склеивается» между сервисами.
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-code
  namespace: lab
data:
  requirements.txt: |
    # Версии запинены с живого прогона (Kubespray, 2026-06) — воспроизводимость.
    # instrumentation-logging НЕ входит в distro: без него
    # OTEL_PYTHON_LOG_CORRELATION не подставит trace_id в логи (Часть 4).
    flask==3.1.3
    requests==2.34.2
    opentelemetry-distro==0.63b1
    opentelemetry-exporter-otlp-proto-grpc==1.42.1
    opentelemetry-instrumentation-flask==0.63b1
    opentelemetry-instrumentation-requests==0.63b1
    opentelemetry-instrumentation-logging==0.63b1
  app.py: |
    import logging
    import os

    import requests
    from flask import Flask, Response, jsonify

    # setLevel нужен явно: при активной LoggingInstrumentor root-обработчик
    # уже существует и второй basicConfig — no-op (подробнее в backend-code).
    logging.basicConfig(level=logging.INFO)
    logging.getLogger().setLevel(logging.INFO)
    log = logging.getLogger("frontend")
    app = Flask(__name__)

    BACKEND_URL = os.environ.get("BACKEND_URL", "http://backend:5000")

    @app.route("/healthz")
    def healthz():
        return "ok"

    @app.route("/")
    def index():
        try:
            # requests инструментирован: CLIENT-спан + проброс traceparent.
            r = requests.get(f"{BACKEND_URL}/api/quote", timeout=3)
        except requests.RequestException as exc:
            log.error("backend unreachable: %s", exc)
            return jsonify(error=str(exc)), 502
        # Строка лога получит trace_id (OTEL_PYTHON_LOG_CORRELATION) — точка
        # склейки «лог в Loki → трейс в Tempo».
        log.info("backend answered: status=%s", r.status_code)
        return Response(r.text, status=r.status_code,
                        content_type="application/json")

    if __name__ == "__main__":
        app.run(host="0.0.0.0", port=5000)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: lab
  labels:
    app: frontend
spec:
  replicas: 1
  # Recreate по той же причине, что и backend: surge не влезает в квоту.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: app
        image: python:3.12-alpine
        workingDir: /app
        command: ["sh", "-c"]
        args:
        - |
          pip install --no-cache-dir --quiet --root-user-action=ignore -r /app/requirements.txt \
            && exec opentelemetry-instrument python /app/app.py
        env:
        - name: OTEL_SERVICE_NAME
          value: frontend
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: http://otel-collector:4317
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: grpc
        - name: OTEL_TRACES_EXPORTER
          value: otlp
        - name: OTEL_METRICS_EXPORTER
          value: "none"
        - name: OTEL_LOGS_EXPORTER
          value: "none"
        - name: OTEL_PYTHON_LOG_CORRELATION
          value: "true"
        - name: OTEL_PYTHON_FLASK_EXCLUDED_URLS
          value: healthz
        - name: BACKEND_URL
          value: http://backend:5000
        ports:
        - containerPort: 5000
          name: http
        startupProbe:
          httpGet:
            path: /healthz
            port: 5000
          periodSeconds: 5
          failureThreshold: 60
        readinessProbe:
          httpGet:
            path: /healthz
            port: 5000
          periodSeconds: 10
        resources:
          requests:
            cpu: 50m
            memory: 96Mi
          limits:
            cpu: 150m
            memory: 192Mi
        volumeMounts:
        - name: code
          mountPath: /app
      volumes:
      - name: code
        configMap:
          name: frontend-code
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: lab
spec:
  selector:
    app: frontend
  ports:
  - name: http
    port: 5000
    targetPort: 5000
