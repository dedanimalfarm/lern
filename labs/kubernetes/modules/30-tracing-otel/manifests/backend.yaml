# Демо-бэкенд. Код лежит в ConfigMap (а не в собственном образе) сознательно:
# в лабе нет registry, а так студент видит ровно тот код, который трассируется.
# Зависимости ставятся pip'ом на старте пода (~1–2 мин на e2-medium) — цена
# прозрачности; в проде это, конечно, был бы собранный образ.
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-code
  namespace: lab
data:
  requirements.txt: |
    # Версии запинены с живого прогона (Kubespray, 2026-06) — воспроизводимость.
    # instrumentation-logging НЕ входит в distro: без него
    # OTEL_PYTHON_LOG_CORRELATION не подставит trace_id в логи (Часть 4).
    flask==3.1.3
    requests==2.34.2
    opentelemetry-distro==0.63b1
    opentelemetry-exporter-otlp-proto-grpc==1.42.1
    opentelemetry-instrumentation-flask==0.63b1
    opentelemetry-instrumentation-requests==0.63b1
    opentelemetry-instrumentation-logging==0.63b1
  app.py: |
    # Автоинструментация (opentelemetry-instrument) сама создаёт SERVER-спан на
    # каждый HTTP-запрос Flask. Здесь дополнительно показан РУЧНОЙ дочерний спан
    # (db-query): так оборачивают код, который автоматика не видит.
    import logging
    import random
    import time

    from flask import Flask, abort, jsonify
    from opentelemetry import trace

    # При включённой LoggingInstrumentor (OTEL_PYTHON_LOG_CORRELATION=true)
    # root-обработчик уже создан с otel-форматом ДО импорта app.py — второй
    # basicConfig тогда no-op, поэтому уровень поднимаем явно через setLevel.
    logging.basicConfig(level=logging.INFO)
    logging.getLogger().setLevel(logging.INFO)
    log = logging.getLogger("backend")
    app = Flask(__name__)

    # Имя из get_tracer попадает в InstrumentationScope спана (видно в Tempo).
    tracer = trace.get_tracer("backend.manual")

    QUOTES = [
        "Span - единица работы, trace - дерево спанов",
        "Сначала смотри в трейс, потом в логи",
        "W3C traceparent склеивает сервисы в один trace",
        "Семплируй с головой: 100% трейсов нужны только в лабе",
    ]

    @app.route("/healthz")
    def healthz():
        # Исключён из трассировки (OTEL_PYTHON_FLASK_EXCLUDED_URLS=healthz),
        # чтобы пробы kubelet не засоряли Tempo служебными трейсами.
        return "ok"

    @app.route("/api/quote")
    def quote():
        # Ручной спан: имитация похода в БД (50-300 мс задержки).
        with tracer.start_as_current_span("db-query") as span:
            delay = random.uniform(0.05, 0.3)
            time.sleep(delay)
            span.set_attribute("db.simulated.delay_ms", int(delay * 1000))

        # ~10% запросов «падают» — чтобы в TraceQL было что искать по status=error.
        if random.random() < 0.1:
            log.error("simulated db failure")
            abort(500, description="simulated db failure")

        q = random.choice(QUOTES)
        # Благодаря OTEL_PYTHON_LOG_CORRELATION=true в строку лога попадает
        # trace_id — по нему Grafana свяжет лог в Loki с трейсом в Tempo.
        log.info("quote served: %s", q)
        return jsonify(quote=q)

    if __name__ == "__main__":
        # Дев-сервера Flask хватает для лабы; reloader выключен (debug=False),
        # иначе форк процесса ломает автоинструментацию.
        app.run(host="0.0.0.0", port=5000)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: lab
  labels:
    app: backend
spec:
  replicas: 1
  # Recreate: квота limits.cpu ns lab заполнена почти целиком (LimitRange
  # навешивает дефолтные лимиты на стек модуля 18) — surge-под RollingUpdate
  # не проходит по квоте, rollout повисает. Без surge рестарт всегда проходит.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: app
        image: python:3.12-alpine
        workingDir: /app
        command: ["sh", "-c"]
        # exec обязателен: иначе PID 1 — это sh, и SIGTERM при остановке пода
        # не дойдёт до python (под будет умирать по таймауту 30с).
        args:
        - |
          pip install --no-cache-dir --quiet --root-user-action=ignore -r /app/requirements.txt \
            && exec opentelemetry-instrument python /app/app.py
        env:
        - name: OTEL_SERVICE_NAME            # service.name — главный идентификатор в Tempo
          value: backend
        - name: OTEL_EXPORTER_OTLP_ENDPOINT  # приложение знает ТОЛЬКО коллектор
          value: http://otel-collector:4317
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: grpc
        - name: OTEL_TRACES_EXPORTER
          value: otlp
        - name: OTEL_METRICS_EXPORTER        # фокус модуля — трейсы; метрики/логи
          value: "none"                      # через OTLP не шлём
        - name: OTEL_LOGS_EXPORTER
          value: "none"
        - name: OTEL_PYTHON_LOG_CORRELATION  # подставляет trace_id/span_id в логи
          value: "true"
        - name: OTEL_PYTHON_FLASK_EXCLUDED_URLS
          value: healthz
        ports:
        - containerPort: 5000
          name: http
        # startupProbe закрывает окно pip install (до ~5 мин на слабом CPU);
        # readinessProbe дальше следит в обычном режиме.
        startupProbe:
          httpGet:
            path: /healthz
            port: 5000
          periodSeconds: 5
          failureThreshold: 60
        readinessProbe:
          httpGet:
            path: /healthz
            port: 5000
          periodSeconds: 10
        resources:
          requests:
            cpu: 50m
            memory: 96Mi
          limits:
            cpu: 150m
            memory: 192Mi
        volumeMounts:
        - name: code
          mountPath: /app
      volumes:
      - name: code
        configMap:
          name: backend-code
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: lab
spec:
  selector:
    app: backend
  ports:
  - name: http
    port: 5000
    targetPort: 5000
