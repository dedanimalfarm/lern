name: Kubernetes Labs CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y yamllint shellcheck
          wget https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar xf kubeconform-linux-amd64.tar.gz
          sudo mv kubeconform /usr/local/bin/
          rm kubeconform-linux-amd64.tar.gz

      - name: Run Linters (yamllint, kubeconform, shellcheck, kustomize)
        run: |
          cd labs/kubernetes
          bash scripts/qa/lint.sh

  kind-test:
    name: Test on Kind
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create k8s Kind Cluster
        uses: helm/kind-action@v1.10.0
        with:
          version: v0.23.0
          node_image: kindest/node:v1.30.0

      - name: Run automated sweep on kind
        run: |
          cd labs/kubernetes
          # Create a dummy script or modify sweep.sh to only run cluster-agnostic modules.
          # Some modules (e.g., ingress, cert-manager, external-secrets) require specific node setups or heavy operators,
          # so we only run basic stateless modules on kind in CI.
          export KUBECONFIG=~/.kube/config
          echo "Running module 01-kubectl-basics..."
          bash scripts/qa/run-module.sh modules/01-kubectl-basics
          echo "Running module 02-pods-lifecycle..."
          bash scripts/qa/run-module.sh modules/02-pods-lifecycle
          echo "Running module 03-workloads..."
          bash scripts/qa/run-module.sh modules/03-workloads
          echo "Running module 06-scheduling..."
          bash scripts/qa/run-module.sh modules/06-scheduling
          echo "Running module 07-config-security..."
          bash scripts/qa/run-module.sh modules/07-config-security
          echo "Running module 20-batch-workflows..."
          bash scripts/qa/run-module.sh modules/20-batch-workflows
