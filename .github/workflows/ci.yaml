name: Kubernetes Labs CI

# path-фильтр: kind-тест 6 модулей не должен гоняться (и краснеть) на
# коммитах в другие лабы репо (ansible/docker/linux).
on:
  push:
    branches: [ "main" ]
    paths:
      - 'labs/kubernetes/**'
      - '.github/workflows/ci.yaml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'labs/kubernetes/**'
      - '.github/workflows/ci.yaml'

jobs:
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y yamllint shellcheck
          wget https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar xf kubeconform-linux-amd64.tar.gz
          sudo mv kubeconform /usr/local/bin/
          rm kubeconform-linux-amd64.tar.gz

      - name: Run Linters (yamllint, kubeconform, shellcheck, kustomize)
        run: |
          cd labs/kubernetes
          bash scripts/qa/lint.sh

  kind-test:
    name: Test on Kind
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create k8s Kind Cluster
        uses: helm/kind-action@v1.10.0
        with:
          version: v0.23.0
          node_image: kindest/node:v1.30.0

      - name: Bootstrap lab namespaces and quotas
        # На свежем kind нет ns lab — без bootstrap каждый run-module падал
        # «namespaces "lab" not found» (исторический красный этого workflow).
        run: |
          cd labs/kubernetes
          export KUBECONFIG=~/.kube/config
          bash scripts/bootstrap/00-create-namespaces.sh
          bash scripts/bootstrap/01-apply-quotas.sh

      - name: Run automated sweep on kind
        run: |
          cd labs/kubernetes
          # Create a dummy script or modify sweep.sh to only run cluster-agnostic modules.
          # Some modules (e.g., ingress, cert-manager, external-secrets) require specific node setups or heavy operators,
          # so we only run basic stateless modules on kind in CI.
          export KUBECONFIG=~/.kube/config
          # clean-module после каждого модуля сносит quota/limitrange —
          # восстанавливаем перед каждым прогоном, чтобы условия были одинаковые.
          run_one() {
            echo "Running module $1..."
            bash scripts/bootstrap/00-create-namespaces.sh >/dev/null
            bash scripts/bootstrap/01-apply-quotas.sh >/dev/null
            bash scripts/qa/run-module.sh "modules/$1"
          }
          run_one 01-kubectl-basics
          run_one 02-pods-lifecycle
          run_one 03-workloads
          run_one 06-scheduling
          run_one 07-config-security
          run_one 20-batch-workflows
